    <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-opacity="0.12"/>
    </filter>
    <filter id="starGlow" x="-80%" y="-80%" width="260%" height="260%">
