      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="moonGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <mask id="crescentMask">
      <circle cx="248" cy="228" r="88" fill="#fff"/>
      <circle cx="286" cy="208" r="72" fill="#000"/>
    </mask>
  </defs>

  <circle cx="256" cy="256" r="248" fill="url(#outerGrad)" filter="url(#dropShadow)"/>
