<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="ĺ¦AI">
  <defs>
    <linearGradient id="outerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB6C1"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
    <radialGradient id="innerGrad" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#FFFEF9"/>
      <stop offset="100%" stop-color="#FFFDF7"/>
    </radialGradient>
    <linearGradient id="moonGrad" x1="20%" y1="10%" x2="80%" y2="90%">
