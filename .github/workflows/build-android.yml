name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  SERVER_PORT: '9050'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            server/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Build Web
        run: |
          cd web
          export VITE_SERVER_URL="${{ secrets.VITE_SERVER_URL || 'http://124.220.4.69:9050' }}"
          npm run build
          BUILD=$(date +%Y%m%d%H%M)
          VERSION=$(node -p "require('./package.json').version")
          echo "{\"version\":\"$VERSION\",\"build\":\"$BUILD\",\"updatedAt\":\"$(date -Iseconds)\"}" > dist/build-info.json

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: cd web && npx cap sync android

      - name: Build APK
        run: |
          cd web/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Package APK
        run: |
          mkdir -p server/downloads
          cp web/android/app/build/outputs/apk/debug/app-debug.apk server/downloads/tongmeng-ai.apk
          BUILD=$(date +%Y%m%d%H%M)
          VERSION=$(node -p "require('./web/package.json').version")
          echo "{\"version\":\"$VERSION\",\"build\":\"$BUILD\",\"updatedAt\":\"$(date -Iseconds)\"}" > server/downloads/build-info.json
          ls -lh server/downloads/tongmeng-ai.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tongmeng-ai-apk
          path: |
            server/downloads/tongmeng-ai.apk
            server/downloads/build-info.json
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: server/downloads/tongmeng-ai.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: tongmeng-ai-apk
          path: server/downloads

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build Web for deploy
        run: cd web && npm ci && npm run build

      - name: Deploy to server via SSH
        if: ${{ secrets.DEPLOY_HOST != '' }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '9050' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          export DEPLOY_SSH_KEY=~/.ssh/deploy_key
          chmod +x scripts/deploy.sh
          SKIP_APK=1 ./scripts/deploy.sh

      - name: Notify deploy webhook
        if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_WEBHOOK_SECRET != '' }}
        run: |
          BUILD=$(cat server/downloads/build-info.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).build")
          VERSION=$(cat server/downloads/build-info.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")
          curl -sf -X POST "http://${{ secrets.DEPLOY_HOST }}:${{ secrets.SERVER_PORT || '9050' }}/api/deploy/publish-apk" \
            -H "Content-Type: application/json" \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -d "{\"version\":\"$VERSION\",\"build\":\"$BUILD\"}" || echo "Webhook 通知跳过"
